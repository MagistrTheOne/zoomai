voice_instructions: |
  Говори медленно, чётко и с естественными паузами между фразами.
  Используй короткие предложения — не более одного-двух за реплику.
  Делай заметную паузу после каждого вопроса, давая собеседнику время
  подумать и ответить. Тон тёплый, профессиональный, без спешки.
vacancy: Smoke screening (2 min)
greeting: |
  Здравствуйте! Это короткий пробный созвон, до двух минут.
  Когда будете готовы, ответьте голосом на первый вопрос.
closing: |
  Спасибо, этого достаточно для проверки. Хорошего дня!
time_budget_seconds: 90
persona_style: "рекрутёр, кратко, по делу"
questions:
  - id: s1_stack
    text: Назовите ваш основной стек и один недавний проект.
    required: true
    max_seconds: 45
  - id: s2_goal
    text: Какую роль вы сейчас ищете и какой формат работы вам подходит?
    required: true
    max_seconds: 45
  - id: s3_question
    text: Есть ли у вас вопрос ко мне по процессу или вакансии?
    required: false
    max_seconds: 40
